<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner container">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">TaskFlow</span>
      </div>
      <p class="header-tagline">Stay organised. Get things done.</p>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="container main">

    <!-- ── Stats ── -->
    <section class="stats-section" aria-label="Task statistics">
      <div class="stat-card" id="stat-total">
        <span class="stat-value" id="stat-total-value">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat-card stat-card--pending" id="stat-pending">
        <span class="stat-value" id="stat-pending-value">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-card stat-card--completed" id="stat-completed">
        <span class="stat-value" id="stat-completed-value">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-card stat-card--high" id="stat-high">
        <span class="stat-value" id="stat-high-value">0</span>
        <span class="stat-label">High Priority</span>
      </div>
    </section>

    <!-- ── Add / Edit Form ── -->
    <section class="form-section card" aria-label="Add or edit task">
      <h2 class="section-title" id="form-title">Add New Task</h2>
      <form id="task-form" novalidate>
        <div class="form-grid">
          <div class="form-group form-group--wide">
            <label for="task-title">Task Title <span class="required">*</span></label>
            <input
              type="text"
              id="task-title"
              placeholder="What needs to be done?"
              maxlength="120"
              required
              autocomplete="off"
            />
            <span class="field-error" id="title-error" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-due">Due Date <span class="optional">(optional)</span></label>
            <input type="date" id="task-due" />
          </div>

          <div class="form-group form-group--wide">
            <label for="task-notes">Notes <span class="optional">(optional)</span></label>
            <textarea
              id="task-notes"
              rows="2"
              placeholder="Additional details…"
              maxlength="300"
            ></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn--primary" id="submit-btn">
            <span class="btn-icon">＋</span> Add Task
          </button>
          <button type="button" class="btn btn--ghost" id="cancel-btn" hidden>
            Cancel
          </button>
        </div>
      </form>
    </section>

    <!-- ── Search & Filters ── -->
    <section class="controls-section" aria-label="Search and filter tasks">
      <div class="search-wrapper">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="search-input"
          placeholder="Search tasks…"
          aria-label="Search tasks"
          autocomplete="off"
        />
      </div>

      <div class="filter-tabs" role="tablist" aria-label="Filter tasks">
        <button class="filter-tab active" role="tab" aria-selected="true"  data-filter="all">All</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-filter="pending">Pending</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-filter="completed">Completed</button>
        <button class="filter-tab"        role="tab" aria-selected="false" data-filter="high">High Priority</button>
      </div>
    </section>

    <!-- ── Task List ── -->
    <section class="tasks-section" aria-label="Task list">
      <div class="tasks-header">
        <h2 class="section-title" id="tasks-heading">All Tasks</h2>
        <span class="tasks-count" id="tasks-count"></span>
      </div>

      <div id="task-list" class="task-list" role="list"></div>

      <div id="empty-state" class="empty-state" hidden>
        <span class="empty-icon">📋</span>
        <p class="empty-title">No tasks here yet</p>
        <p class="empty-sub">Add your first task above to get started.</p>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <p>TaskFlow &copy; 2025 &mdash; Built with HTML, CSS &amp; JavaScript</p>
    </div>
  </footer>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
